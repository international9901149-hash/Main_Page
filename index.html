<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臨床工具導覽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .site-title {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #111;
  }

  .divider {
    width: 32px;
    height: 2px;
    background: #111;
    margin: 14px auto 0;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 220px);
    gap: 16px;
  }

  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; width: 100%; max-width: 280px; }
  }

  /* Card */
  a.card {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 22px 16px;
    border: 1.5px solid #1a1a1a;
    text-decoration: none;
    color: #1a1a1a;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    line-height: 1.5;
    background: #fff;
    transition: background 0.18s, color 0.18s;
    cursor: pointer;
  }

  a.card:hover {
    background: #1a1a1a;
    color: #fff;
  }

  footer {
    margin-top: 48px;
    font-size: 11px;
    color: #bbb;
    letter-spacing: 0.1em;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <p class="site-title">Clinical Tools</p>
  <h1>臨床工具導覽</h1>
  <div class="divider"></div>
</header>

<div class="grid">
  <a class="card" href="https://international9901149-hash.github.io/Admission_Note/" target="_blank">住院病歷紀錄</a>
  <a class="card" href="https://international9901149-hash.github.io/Afib_NOAC_Evaluation/" target="_blank">Afib 抗凝劑評估</a>
  <a class="card" href="https://international9901149-hash.github.io/NIHSS/" target="_blank">NIHSS</a>
  <a class="card" href="https://international9901149-hash.github.io/lipidemia-risk-calculator/" target="_blank">高血脂評估與治療</a>
  <a class="card" href="https://international9901149-hash.github.io/Dyspnea_Evaluation/" target="_blank">呼吸困難評估工具</a>
  <a class="card" href="https://international9901149-hash.github.io/CKD_Evaulation/" target="_blank">CKD分期與用藥評估</a>
  <a class="card" href="https://international9901149-hash.github.io/Finance_Sheet/" target="_blank">資產負債表</a>
  <a class="card" href="https://international9901149-hash.github.io/Health_monitor/" target="_blank">健康監測表</a>
</div>

<footer>Taichung Veterans General Hospital &nbsp;·&nbsp; Internal Medicine / Pulmonology</footer>

</body>
</html>
