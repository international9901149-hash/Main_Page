<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莊子逸醫師 臨床與生活工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 48px 32px 64px;
  }

  /* 頁首 */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: #111;
  }

  .divider-header {
    width: 32px;
    height: 2px;
    background: #111;
    margin: 12px auto 0;
  }

  /* 主體兩欄 */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 48px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* 左欄 / 右欄 */
  .col { display: flex; flex-direction: column; gap: 36px; }

  /* 分類區塊 */
  .section { display: flex; flex-direction: column; gap: 12px; }

  .section-title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #111;
    padding-bottom: 6px;
    border-bottom: 1.5px solid #111;
    display: block;
    width: 100%;
    text-align: center;
  }

  /* 卡片行：固定兩欄，每格等寬 */
  .card-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* 按鈕卡片 */
  a.card {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 14px 8px;
    width: 100%;
    border: 1.5px solid #1a1a1a;
    text-decoration: none;
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    line-height: 1.5;
    background: #fff;
    transition: background 0.18s, color 0.18s;
    cursor: pointer;
  }

  a.card:hover {
    background: #1a1a1a;
    color: #fff;
  }

  /* 響應式 */
  @media (max-width: 600px) {
    .main-layout { grid-template-columns: 1fr; gap: 36px; }
    .card-row { grid-template-columns: 1fr; }
  }

  footer {
    text-align: center;
    margin-top: 56px;
    font-size: 11px;
    color: #bbb;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<header>
  <h1>莊子逸醫師 臨床與生活工具</h1>
  <div class="divider-header"></div>
</header>

<div class="main-layout">

  <!-- 左欄 -->
  <div class="col">

    <div class="section">
      <span class="section-title">臨床業務</span>
      <div class="card-row">
        <a class="card" href="https://international9901149-hash.github.io/Admission_Note/" target="_blank">住院病歷紀錄</a>
        <a class="card" href="https://international9901149-hash.github.io/Discharge_Medication/" target="_blank">出院藥物交班系統</a>
      </div>
    </div>

    <div class="section">
      <span class="section-title">評量表單</span>
      <div class="card-row">
        <a class="card" href="https://international9901149-hash.github.io/NIHSS/" target="_blank">NIHSS</a>
        <a class="card" href="https://international9901149-hash.github.io/Dyspnea_Evaluation/" target="_blank">呼吸困難評估工具</a>
      </div>
    </div>

    <div class="section">
      <span class="section-title">疾病治療指引</span>
      <div class="card-row">
        <a class="card" href="https://international9901149-hash.github.io/Afib_NOAC_Evaluation/" target="_blank">Afib 抗凝劑評估</a>
        <a class="card" href="https://international9901149-hash.github.io/lipidemia-risk-calculator/" target="_blank">高血脂評估與治療</a>
      </div>
      <div class="card-row">
        <a class="card" href="https://international9901149-hash.github.io/CKD_Evaulation/" target="_blank">CKD分期與用藥評估</a>
      </div>
    </div>

  </div>

  <!-- 右欄 -->
  <div class="col">

    <div class="section">
      <span class="section-title">健康生活</span>
      <div class="card-row">
        <a class="card" href="https://international9901149-hash.github.io/Health_monitor/" target="_blank">健康監測表</a>
        <a class="card" href="https://international9901149-hash.github.io/Health_Promotion/" target="_blank">健康促進表</a>
      </div>
    </div>

    <div class="section">
      <span class="section-title">投資理財</span>
      <div class="card-row">
        <a class="card" href="https://international9901149-hash.github.io/Finance_Sheet/" target="_blank">個人資產負債表</a>
        <a class="card" href="https://international9901149-hash.github.io/balance_report/" target="_blank">現金流量表</a>
      </div>
    </div>

  </div>

</div>

<footer>Taichung Veterans General Hospital &nbsp;·&nbsp; Internal Medicine / Pulmonology</footer>

</body>
</html>
